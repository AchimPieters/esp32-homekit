name: ESP-IDF compatibility

on:
  push:
  pull_request:

jobs:
  build:
    name: idf-${{ matrix.idf }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backward compatibility line (ESP-IDF v5.x)
          - idf: "v5.3"
            target: "esp32"
          - idf: "v5.3"
            target: "esp32s2"
          - idf: "v5.3"
            target: "esp32s3"
          - idf: "v5.3"
            target: "esp32c2"
          - idf: "v5.3"
            target: "esp32c3"
          - idf: "v5.3"
            target: "esp32c6"
          # Latest major line (ESP-IDF v6.x)
          - idf: "v6.0"
            target: "esp32"
          - idf: "v6.0"
            target: "esp32s2"
          - idf: "v6.0"
            target: "esp32s3"
          - idf: "v6.0"
            target: "esp32c2"
          - idf: "v6.0"
            target: "esp32c3"
          - idf: "v6.0"
            target: "esp32c5"
          - idf: "v6.0"
            target: "esp32c6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ESP-IDF version
        run: idf.py --version

      - name: Build smoke app
        working-directory: ci/smoke_app
        run: |
          idf.py set-target ${{ matrix.target }}
          idf.py build
