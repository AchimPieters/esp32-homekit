name: ESP-IDF compatibility

on:
  push:
    branches:
      - main
      - work
  pull_request:
  workflow_dispatch:

jobs:
  host-sanity:
    name: host-sanity (asan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and run host regression tests
        shell: bash
        run: |
          set -euxo pipefail
          gcc -std=c11 -Wall -Wextra -Werror -pedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Iinclude -Isrc \
            tests/host/test_core.c src/base64.c src/query_params.c src/bitset.c \
            -o /tmp/homekit-host-tests
          /tmp/homekit-host-tests

  build:
    name: idf-${{ matrix.idf }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    env:
      IDF_PATH: ${{ github.workspace }}/.esp-idf
      IDF_COMPONENT_REGISTRY_URL: https://components.espressif.com/
      IDF_COMPONENT_STORAGE_URL: https://components-file.espressif.com/
      IDF_COMPONENT_API_TIMEOUT: "120"
      IDF_COMPONENT_API_CACHE_EXPIRATION_MINUTES: "120"
      EXAMPLE_APP_DIR: examples/led
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          # Backward compatibility line (ESP-IDF v5.3)
          - idf: "release/v5.3"
            target: "esp32"
          - idf: "release/v5.3"
            target: "esp32s2"
          - idf: "release/v5.3"
            target: "esp32s3"
          - idf: "release/v5.3"
            target: "esp32c2"
          - idf: "release/v5.3"
            target: "esp32c3"
          - idf: "release/v5.3"
            target: "esp32c6"
          # Latest major line (ESP-IDF v6.0)
          - idf: "release/v6.0"
            target: "esp32"
          - idf: "release/v6.0"
            target: "esp32s2"
          - idf: "release/v6.0"
            target: "esp32s3"
          - idf: "release/v6.0"
            target: "esp32c2"
          - idf: "release/v6.0"
            target: "esp32c3"
          - idf: "release/v6.0"
            target: "esp32c5"
          - idf: "release/v6.0"
            target: "esp32c6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone ESP-IDF
        run: git clone --depth 1 --branch "${{ matrix.idf }}" https://github.com/espressif/esp-idf.git "${IDF_PATH}"

      - name: Set up Python 3.11 (IDF v5.x/v6.x compatible)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ESP-IDF tools
        shell: bash
        run: |
          set -euxo pipefail
          # Both release/v5.3 and release/v6.0 install.sh use positional targets
          for attempt in 1 2 3; do
            if "${IDF_PATH}/install.sh" "${{ matrix.target }}"; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "ESP-IDF install failed after ${attempt} attempts"
              exit 1
            fi
            echo "Install attempt ${attempt} failed, retrying in 20s..."
            sleep 20
          done

      - name: Build examples/led app
        shell: bash
        run: |
          set -euxo pipefail
          . "${IDF_PATH}/export.sh"
          cd "${EXAMPLE_APP_DIR}"
          idf.py --version
          idf.py set-target "${{ matrix.target }}"
          for attempt in 1 2 3; do
            if idf.py build -v; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Build failed after ${attempt} attempts"
              exit 1
            fi
            echo "Build attempt ${attempt} failed, retrying in 20s..."
            sleep 20
          done

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: esp-idf-logs-${{ replace(matrix.idf, '/', '-') }}-${{ matrix.target }}
          path: |
            ${{ env.EXAMPLE_APP_DIR }}/build/log/
            ${{ env.EXAMPLE_APP_DIR }}/build/CMakeFiles/CMakeError.log
            ${{ env.EXAMPLE_APP_DIR }}/build/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore
