name: ESP-IDF compatibility

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: idf-${{ matrix.idf }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    env:
      IDF_PATH: ${{ github.workspace }}/.esp-idf
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backward compatibility line (ESP-IDF v5.x)
          - idf: "release/v5.3"
            target: "esp32"
          - idf: "release/v5.3"
            target: "esp32s2"
          - idf: "release/v5.3"
            target: "esp32s3"
          - idf: "release/v5.3"
            target: "esp32c2"
          - idf: "release/v5.3"
            target: "esp32c3"
          - idf: "release/v5.3"
            target: "esp32c6"
          # Latest major line (ESP-IDF v6.x)
          - idf: "release/v6.0"
            target: "esp32"
          - idf: "release/v6.0"
            target: "esp32s2"
          - idf: "release/v6.0"
            target: "esp32s3"
          - idf: "release/v6.0"
            target: "esp32c2"
          - idf: "release/v6.0"
            target: "esp32c3"
          - idf: "release/v6.0"
            target: "esp32c5"
          - idf: "release/v6.0"
            target: "esp32c6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone ESP-IDF
        run: git clone --depth 1 --branch "${{ matrix.idf }}" https://github.com/espressif/esp-idf.git "${IDF_PATH}"

      - name: Set up Python 3.11 (IDF v5.x/v6.x compatible)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ESP-IDF tools
        shell: bash
        run: |
          set -euxo pipefail
          # Both release/v5.3 and release/v6.0 install.sh use positional targets
          "${IDF_PATH}/install.sh" "${{ matrix.target }}"

      - name: Build examples/led app
        shell: bash
        run: |
          set -euxo pipefail
          . "${IDF_PATH}/export.sh"
          cd examples/led
          idf.py --version
          idf.py set-target "${{ matrix.target }}"
          idf.py build -v
