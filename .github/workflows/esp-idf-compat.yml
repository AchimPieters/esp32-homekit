name: ESP-IDF compatibility

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: idf-${{ matrix.idf }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backward compatibility line (ESP-IDF v5.x)
          - idf: "v5.3"
            target: "esp32"
          - idf: "v5.3"
            target: "esp32s2"
          - idf: "v5.3"
            target: "esp32s3"
          - idf: "v5.3"
            target: "esp32c2"
          - idf: "v5.3"
            target: "esp32c3"
          - idf: "v5.3"
            target: "esp32c6"
          # Latest major line (ESP-IDF v6.x)
          - idf: "v6.0"
            target: "esp32"
          - idf: "v6.0"
            target: "esp32s2"
          - idf: "v6.0"
            target: "esp32s3"
          - idf: "v6.0"
            target: "esp32c2"
          - idf: "v6.0"
            target: "esp32c3"
          - idf: "v6.0"
            target: "esp32c5"
          - idf: "v6.0"
            target: "esp32c6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull ESP-IDF Docker image
        run: docker pull espressif/idf:${{ matrix.idf }}

      - name: Build smoke app in ESP-IDF Docker
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w /project/ci/smoke_app \
            espressif/idf:${{ matrix.idf }} \
            bash -lc "git config --global --add safe.directory /project && \
                      git config --global --add safe.directory /project/ci/smoke_app && \
                      idf.py --version && \
                      idf.py set-target ${{ matrix.target }} && \
                      idf.py build -v"
