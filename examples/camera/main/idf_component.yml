## Component dependencies for the HomeKit camera example.
##
## esp_video  : V4L2 camera capture (+ hardware H.264 on ESP32-P4).
## esp_h264   : H.264 encoder API — hardware on ESP32-P4, software (OpenH264)
##              on ESP32-S3. Required for H.264 on the S3, where esp_video
##              itself provides capture only (no H.264 hardware).
##
## NOTE: these pull in a large camera/V4L2/ISP stack and require ESP-IDF >= 5.4,
## which is why they live in this example and NOT in the core esp32-homekit
## component manifest. Targets: ESP32-P4 and ESP32-S3 (not the classic ESP32).
## See docs/AUDIT_esp_video_2.2.0.md and docs/CAMERA.md.
dependencies:
  idf:
    version: ">=5.4"
  esp32-homekit:
    override_path: ../../..
  espressif/esp_video:
    version: "~2.2.0"
    rules:
      - if: "target in [esp32p4, esp32s3]"
  espressif/esp_h264:
    version: "~1.3.0"
    rules:
      - if: "target in [esp32p4, esp32s3]"
