name: ESP-IDF compatibility

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: idf-${{ matrix.idf }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backward compatibility line (ESP-IDF v5.x)
          - idf: "release-v5.3"
            target: "esp32"
          - idf: "release-v5.3"
            target: "esp32s2"
          - idf: "release-v5.3"
            target: "esp32s3"
          - idf: "release-v5.3"
            target: "esp32c2"
          - idf: "release-v5.3"
            target: "esp32c3"
          - idf: "release-v5.3"
            target: "esp32c6"
          # Latest major line (ESP-IDF v6.x)
          - idf: "release-v6.0"
            target: "esp32"
          - idf: "release-v6.0"
            target: "esp32s2"
          - idf: "release-v6.0"
            target: "esp32s3"
          - idf: "release-v6.0"
            target: "esp32c2"
          - idf: "release-v6.0"
            target: "esp32c3"
          - idf: "release-v6.0"
            target: "esp32c5"
          - idf: "release-v6.0"
            target: "esp32c6"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build smoke app (ESP-IDF CI action)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf }}
          target: ${{ matrix.target }}
          path: ci/smoke_app
          command: idf.py build -v
